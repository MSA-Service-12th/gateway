server:
  port: 18080

spring:
  application:
    name: gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ISSUER_URI:http://localhost:13300/realms/my-realm}
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/users/**, /api/couriers/**
              # /internal/** 경로는 gateway 라우팅에서 제외 — 내부 Feign 호출은 Eureka로 직접 도달하며,
              # gateway가 권한 검증 없이 통과시키면(permitAll) 외부 노출 시 보안 구멍이 됨.

            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/api/orders/**

            - id: hub-service
              uri: lb://HUB-SERVICE
              predicates:
                - Path=/api/hubs/**

            - id: hub-inventory-service
              uri: lb://HUB-SERVICE
              predicates:
                - Path=/api/hub-inventories/**, /internal/hub-inventories/**

            - id: hub-route-service
              uri: lb://ROUTE-SERVICE
              predicates:
                - Path=/api/hub-routes/**

            - id: company-service
              uri: lb://COMPANY-SERVICE
              predicates:
                - Path=/api/companies/**

            - id: item-service
              uri: lb://ITEM-SERVICE
              predicates:
                - Path=/api/items/**

            - id: delivery-service
              uri: lb://DELIVERY-SERVICE
              predicates:
                - Path=/api/deliveries/**

            - id: message-service
              uri: lb://MESSAGE-SERVICE
              predicates:
                - Path=/api/messages/**

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:18761/eureka/}

keycloak:
  client-id: ${CLIENT_ID}
  client-secret: ${CLIENT_SECRET}
